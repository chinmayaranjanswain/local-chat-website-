<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <meta name="description" content="ApniBaat — Instant, private LAN chat. No accounts, no setup. Just open and talk." />
  <title>ApniBaat — Private LAN Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>

  <!-- ════════════════ LANDING SCREEN ════════════════ -->
  <section id="landing-screen" class="screen active">
    <div class="landing-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="landing-card">
      <div class="landing-logo">
        <div class="logo-icon">
          <img src="/apnibaat-logo.png" alt="ApniBaat Logo"
            style="width: 40px; height: 40px; border-radius: 12px; object-fit: cover;" />
        </div>
        <h1>ApniBaat</h1>
      </div>
      <p class="landing-subtitle">Private LAN chat — no accounts, no setup, no data stored</p>

      <form id="join-form" autocomplete="off">
        <div class="input-group">
          <input type="text" id="name-input" placeholder="Enter your display name" maxlength="24" required
            autocomplete="off" aria-label="Display name" />
          <span class="input-char-count" id="name-char-count">0/24</span>
        </div>
        <div id="name-error" class="error-text" role="alert"></div>
        <button type="submit" id="join-btn" class="btn-primary">
          <span>Join Chat</span>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 10h12m0 0l-4-4m4 4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </form>

      <div class="landing-info">
        <div class="info-chip">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5" />
            <path d="M7 4v3l2 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
          <span>Ephemeral — messages vanish on exit</span>
        </div>
        <div class="info-chip">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1L1 4l6 3 6-3-6-3zM1 10l6 3 6-3M1 7l6 3 6-3" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>LAN only — data never leaves your network</span>
        </div>
      </div>

      <div class="server-url" id="server-url-display">
        <span class="url-label">Share this link with your team:</span>
        <div class="url-box" id="server-url-box" title="Click to copy">
          <span id="server-url-text">Loading...</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.5" />
            <path d="M11 5V3a2 2 0 00-2-2H3a2 2 0 00-2 2v6a2 2 0 002 2h2" stroke="currentColor" stroke-width="1.5" />
          </svg>
        </div>
      </div>

      <div
        style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); letter-spacing: 0.5px;">
        made with chinmaya 🌻
      </div>
    </div>
  </section>

  <!-- ════════════════ CHAT SCREEN ════════════════ -->
  <section id="chat-screen" class="screen">
    <!-- Header -->
    <header class="chat-header">
      <div class="header-left">
        <div class="logo-icon-sm">
          <img src="/apnibaat-logo.png" alt="ApniBaat Logo"
            style="width: 28px; height: 28px; border-radius: 8px; object-fit: cover;" />
        </div>
        <div class="header-title">
          <h1>ApniBaat</h1>
          <span class="online-count" id="online-count">0 online</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="share-btn" title="Share room link" aria-label="Share room link">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="14" cy="3.5" r="2.5" stroke="currentColor" stroke-width="1.5" />
            <circle cx="4" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5" />
            <circle cx="14" cy="14.5" r="2.5" stroke="currentColor" stroke-width="1.5" />
            <path d="M6.3 7.8l5.4-3.1M6.3 10.2l5.4 3.1" stroke="currentColor" stroke-width="1.5" />
          </svg>
        </button>
        <button class="icon-btn hamburger-btn" id="sidebar-toggle" title="Online users" aria-label="Toggle user list">
          <span class="hamburger-icon">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <div class="chat-body">
      <!-- Online Users Sidebar -->
      <aside class="users-sidebar" id="users-sidebar">
        <div class="sidebar-header">
          <h2>Online</h2>
          <span class="user-count-badge" id="sidebar-count">0</span>
          <button class="sidebar-close-btn" id="sidebar-close" aria-label="Close sidebar">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>
        <ul class="users-list" id="users-list" aria-label="Online users"></ul>
      </aside>

      <!-- Messages Area -->
      <main class="messages-area" id="messages-area" aria-label="Chat messages" role="log">
        <div class="messages-container" id="messages-container"></div>
        <div class="typing-indicator" id="typing-indicator" aria-live="polite"></div>
      </main>
    </div>

    <!-- Message Input -->
    <footer class="message-bar">
      <div class="message-input-wrap">
        <input type="text" id="message-input" placeholder="Type a message..." maxlength="500" autocomplete="off"
          aria-label="Message input" />
        <span class="msg-char-count" id="msg-char-count">0/500</span>
      </div>
      <button class="send-btn" id="send-btn" title="Send message" aria-label="Send message" disabled>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M18 2L9 11M18 2l-5 16-4-8-8-4 16-5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast" role="alert"></div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>
